<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fontsource-roboto@4.0.0/index.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .input-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }
        .input-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .btn-calculate {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }
        .btn-calculate:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">💰 SIP Calculator</h1>
            <p class="text-indigo-200">Calculate your mutual fund returns</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Input Section -->
            <div class="card p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-6">📊 Investment Details</h2>
                
                <!-- Monthly Investment -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">
                        Monthly Investment (₹)
                    </label>
                    <input type="number" id="input-amount" value="10000" 
                        class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none text-lg font-semibold"
                        min="500" max="100000">
                    <input type="range" id="slider-amount" min="500" max="100000" step="500" value="10000"
                        class="input-slider mt-3">
                </div>

                <!-- Expected Return Rate -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">
                        Expected Return Rate (% p.a)
                    </label>
                    <input type="number" id="input-rate" value="12" 
                        class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none text-lg font-semibold"
                        min="1" max="30" step="0.5">
                    <input type="range" id="slider-rate" min="1" max="30" step="0.5" value="12"
                        class="input-slider mt-3">
                </div>

                <!-- Time Period -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">
                        Time Period (Years)
                    </label>
                    <input type="number" id="input-years" value="10" 
                        class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none text-lg font-semibold"
                        min="1" max="40">
                    <input type="range" id="slider-years" min="1" max="40" step="1" value="10"
                        class="input-slider mt-3">
                </div>

                <!-- Calculate Button -->
                <button onclick="calculateSIP()" 
                    class="btn-calculate w-full py-4 rounded-lg text-white font-bold text-lg mt-4">
                    🧮 CALCULATE NOW
                </button>
            </div>

            <!-- Results Section -->
            <div class="space-y-6">
                
                <!-- Results Cards -->
                <div class="card p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">📈 Your Returns</h2>
                    
                    <div class="grid grid-cols-3 gap-4">
                        <div class="text-center p-4 bg-indigo-50 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase">Invested</p>
                            <p class="text-lg font-bold text-indigo-600" id="result-invested">₹0</p>
                        </div>
                        <div class="text-center p-4 bg-emerald-50 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase">Returns</p>
                            <p class="text-lg font-bold text-emerald-600" id="result-returns">₹0</p>
                        </div>
                        <div class="text-center p-4 bg-blue-50 rounded-xl">
                            <p class="text-xs text-gray-500 uppercase">Total</p>
                            <p class="text-lg font-bold text-blue-600" id="result-total">₹0</p>
                        </div>
                    </div>
                </div>

                <!-- Pie Chart (Circle) -->
                <div class="card p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">🥧 Investment Distribution</h2>
                    <div class="flex justify-center">
                        <div class="w-64 h-64">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>
                    <div class="flex justify-center gap-6 mt-4">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-indigo-500"></div>
                            <span class="text-sm text-gray-600">Invested Amount</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-emerald-400"></div>
                            <span class="text-sm text-gray-600">Estimated Returns</span>
                        </div>
                    </div>
                </div>

                <!-- Growth Graph -->
                <div class="card p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">📊 Growth Chart</h2>
                    <div class="w-full h-64">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Chart instances
        let pieChart = null;
        let growthChart = null;

        // Sync sliders with inputs
        function syncInputs() {
            const amountInput = document.getElementById('input-amount');
            const amountSlider = document.getElementById('slider-amount');
            const rateInput = document.getElementById('input-rate');
            const rateSlider = document.getElementById('slider-rate');
            const yearsInput = document.getElementById('input-years');
            const yearsSlider = document.getElementById('slider-years');

            amountSlider.addEventListener('input', () => amountInput.value = amountSlider.value);
            amountInput.addEventListener('input', () => amountSlider.value = amountInput.value);
            
            rateSlider.addEventListener('input', () => rateInput.value = rateSlider.value);
            rateInput.addEventListener('input', () => rateSlider.value = rateInput.value);
            
            yearsSlider.addEventListener('input', () => yearsInput.value = yearsSlider.value);
            yearsInput.addEventListener('input', () => yearsSlider.value = yearsSlider.value);
        }

        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                maximumFractionDigits: 0
            }).format(amount);
        }

        // Calculate SIP
        function calculateSIP() {
            const P = parseFloat(document.getElementById('input-amount').value);
            const r = parseFloat(document.getElementById('input-rate').value);
            const t = parseFloat(document.getElementById('input-years').value);

            const i = r / 12 / 100;
            const n = t * 12;

            const totalValue = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
            const investedAmount = P * n;
            const returns = totalValue - investedAmount;

            // Update results
            document.getElementById('result-invested').textContent = formatCurrency(investedAmount);
            document.getElementById('result-returns').textContent = formatCurrency(returns);
            document.getElementById('result-total').textContent = formatCurrency(totalValue);

            // Update charts
            updatePieChart(investedAmount, returns);
            updateGrowthChart(P, r, t);
        }

        // Update Pie Chart (Circle)
        function updatePieChart(invested, returns) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            
            if (pieChart) {
                pieChart.destroy();
            }

            pieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Invested Amount', 'Estimated Returns'],
                    datasets: [{
                        data: [invested, returns],
                        backgroundColor: ['#6366f1', '#34d399'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return formatCurrency(value) + ` (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Update Growth Chart (Graph)
        function updateGrowthChart(P, r, t) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            const i = r / 12 / 100;
            
            const labels = [];
            const investedData = [];
            const totalData = [];

            for (let year = 1; year <= t; year++) {
                labels.push(`Year ${year}`);
                investedData.push(P * year * 12);
                const n = year * 12;
                const total = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
                totalData.push(total);
            }

            if (growthChart) {
                growthChart.destroy();
            }

            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Invested Amount',
                            data: investedData,
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Total Value',
                            data: totalData,
                            borderColor: '#34d399',
                            backgroundColor: 'rgba(52, 211, 153, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '₹' + (value / 100000).toFixed(0) + 'L';
                                }
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + formatCurrency(context.raw);
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize
        syncInputs();
        calculateSIP();
    </script>
</body>
</html>
